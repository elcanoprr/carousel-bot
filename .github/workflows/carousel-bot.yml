name: Carousel News Bot

on:
  schedule:
    # 3 runs/day — mañana, mediodía y tarde (hora Colombia/México)
    - cron: '0 12 * * *'   # 7am Colombia / 9am Argentina
    - cron: '0 17 * * *'   # 12pm Colombia / 2pm Argentina
    - cron: '0 22 * * *'   # 5pm Colombia / 7pm Argentina
  workflow_dispatch:       # ejecución manual desde GitHub

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: carousel-news-bot/requirements.txt

      - name: Install dependencies
        run: pip install -r carousel-news-bot/requirements.txt

      - name: Run carousel bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        working-directory: carousel-news-bot
        run: python main.py
