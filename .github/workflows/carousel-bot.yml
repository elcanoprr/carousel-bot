name: Carousel News Bot

on:
  schedule:
    # 6 runs/day (hora Colombia UTC-5)
    - cron: '0 11 * * *'   # 6am Colombia
    - cron: '0 13 * * *'   # 8am Colombia
    - cron: '0 15 * * *'   # 10am Colombia
    - cron: '0 18 * * *'   # 1pm Colombia
    - cron: '0 21 * * *'   # 4pm Colombia
    - cron: '0 23 * * *'   # 6pm Colombia
  workflow_dispatch:       # ejecución manual desde GitHub

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: carousel-news-bot/requirements.txt

      - name: Install dependencies
        run: pip install -r carousel-news-bot/requirements.txt

      - name: Run carousel bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        working-directory: carousel-news-bot
        run: python main.py
